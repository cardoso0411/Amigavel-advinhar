<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Adivinhação</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎯 Jogo de Adivinhação</h1>
    <div class="container fade-in" id="jogo">
        <label for="dificuldade">Escolha a dificuldade:</label>
        <select id="dificuldade">
            <option value="10">Fácil (1-10)</option>
            <option value="50">Médio (1-50)</option>
            <option value="100">Difícil (1-100)</option>
        </select>
        <br><br>
        <input type="number" id="palpite" placeholder="Digite seu palpite" />
        <button id="btnJogar" type="button">Jogar</button>
        <p id="mensagem" aria-live="polite"></p>
        <p id="pontuacao">Pontuação: 0</p>
        <button id="btnModo" type="button">🌙 Alternar Modo</button>
        <audio id="musica" src="musica.mp3" loop></audio>
        <button id="btnMusica" type="button">🎵 Tocar / Pausar Música</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
